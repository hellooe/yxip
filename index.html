<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>优选IP节点生成器</title>
    <style>
        :root {
            --primary: #3b82f6;
            --primary-hover: #1d4ed8;
            --success: #10b981;
            --success-hover: #047857;
            --bg-main: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --input-bg: #f8fafc;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #eef2f6 0%, #f4f7fb 100%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.04), 0 4px 12px rgba(0, 0, 0, 0.02);
            max-width: 1200px;
            width: 100%;
            padding: 40px;
            border: 1px solid rgba(255, 255, 255, 0.7);
        }

        header {
            margin-bottom: 32px;
            text-align: center;
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            color: #1e293b;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
        }

        header p {
            color: var(--text-muted);
            font-size: 15px;
        }

        /* 响应式双列布局 */
        .workspace {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 32px;
        }

        @media (max-width: 900px) {
            .workspace {
                grid-template-columns: 1fr;
                gap: 24px;
            }

            body {
                padding: 12px;
            }

            .card {
                padding: 24px 16px;
            }
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            color: #334155;
            font-size: 14px;
            margin-bottom: 8px;
        }

        .form-group .hint {
            font-weight: 400;
            font-size: 13px;
            color: var(--text-muted);
            margin-left: 4px;
        }

        textarea,
        input[type="text"] {
            width: 100%;
            padding: 14px 16px;
            border: 1.5px solid var(--border-color);
            border-radius: 14px;
            font-size: 14px;
            font-family: 'SF Mono', 'Fira Code', Menlo, monospace;
            background: var(--input-bg);
            transition: all 0.2s ease;
            resize: vertical;
            color: var(--text-main);
        }

        textarea:focus,
        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.12);
            background: #fff;
        }

        textarea {
            min-height: 160px;
        }

        .controls-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            flex-wrap: wrap;
            margin-top: 12px;
        }

        .btn-group {
            display: flex;
            gap: 12px;
        }

        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn:hover:not(:disabled) {
            background: var(--primary-hover);
            transform: translateY(-1px);
        }

        .btn:active:not(:disabled) {
            transform: translateY(1px);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: #f1f5f9;
            color: #475569;
        }

        .btn-secondary:hover:not(:disabled) {
            background: #e2e8f0;
        }

        .btn-success {
            background: var(--success);
        }

        .btn-success:hover:not(:disabled) {
            background: var(--success-hover);
        }

        .stats {
            display: flex;
            gap: 12px;
        }

        .stats span {
            background: #f1f5f9;
            padding: 6px 14px;
            border-radius: 10px;
            font-size: 13px;
            color: #475569;
            font-weight: 500;
        }

        .stats strong {
            color: var(--text-main);
            margin-left: 2px;
        }

        .result-column {
            display: flex;
            flex-direction: column;
        }

        .result-column textarea {
            flex-grow: 1;
            min-height: 380px;
            background: #fafafa;
        }

        .msg-box {
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 14px;
            margin-top: 16px;
            display: none;
            line-height: 1.5;
        }

        .msg-box.error {
            background: #fef2f2;
            color: #ef4444;
            border: 1px solid #fee2e2;
            display: block;
        }

        .msg-box.warning {
            background: #fffbeb;
            color: #d97706;
            border: 1px solid #fef3c7;
            display: block;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: #f1f5f9;
            border-radius: 10px;
            margin-top: 16px;
            overflow: hidden;
            display: none;
        }

        .progress-bar .fill {
            height: 100%;
            background: linear-gradient(90deg, #3b82f6, #60a5fa);
            width: 0%;
            transition: width 0.1s linear;
        }
    </style>
</head>

<body>
    <div class="card">
        <header>
            <h1>🌐 优选 IP 节点生成器</h1>
            <p>使用优选 IP 生成 vmess / vless 节点，支持 IPv4 及 IPv6 自动适配</p>
        </header>

        <div class="workspace">
            <div class="input-column">
                <div class="form-group">
                    <label for="originalNode">原始节点链接 <span class="hint">(支持 vmess:// 或 vless://)</span></label>
                    <input type="text" id="originalNode" placeholder="请粘贴完整的单个节点链接...">
                </div>

                <div class="form-group">
                    <label for="ipList">自定义 IP 列表 <span class="hint">(每行一个，自动去重)</span></label>
                    <textarea id="ipList" placeholder="1.1.1.1&#10;8.8.8.8&#10;[2001:db8::1]"></textarea>
                </div>

                <div class="controls-row">
                    <div class="btn-group">
                        <button class="btn" id="generateBtn">⚡ 生成节点</button>
                        <button class="btn btn-secondary" id="clearBtn">🗑️ 清空输入</button>
                    </div>
                    <div class="stats">
                        <span>📋 IP总数: <strong id="ipCount">0</strong></span>
                    </div>
                </div>

                <div class="progress-bar" id="progressBar">
                    <div class="fill" id="progressFill"></div>
                </div>

                <div id="msgBox" class="msg-box"></div>
            </div>

            <div class="result-column">
                <div class="form-group" style="flex-grow: 1; display: flex; flex-direction: column; margin-bottom: 0;">
                    <label style="display: flex; justify-content: space-between; align-items: center;">
                        <span>生成结果</span>
                        <div class="stats"><span style="padding: 2px 8px; font-size: 12px;">已生成: <strong
                                    id="nodeCount">0</strong></span></div>
                    </label>
                    <textarea id="resultArea" placeholder="生成的节点列表将显示在这里..." readonly></textarea>
                </div>

                <div class="controls-row" style="justify-content: flex-start; gap: 12px;">
                    <button class="btn btn-success" id="copyBtn">📋 复制全部</button>
                    <button class="btn btn-secondary" id="clearResultBtn">清空结果</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        (function () {
            const originalNodeInput = document.getElementById('originalNode');
            const ipListTextarea = document.getElementById('ipList');
            const generateBtn = document.getElementById('generateBtn');
            const clearBtn = document.getElementById('clearBtn');
            const copyBtn = document.getElementById('copyBtn');
            const clearResultBtn = document.getElementById('clearResultBtn');
            const resultArea = document.getElementById('resultArea');
            const ipCountSpan = document.getElementById('ipCount');
            const nodeCountSpan = document.getElementById('nodeCount');
            const msgBox = document.getElementById('msgBox');
            const progressBar = document.getElementById('progressBar');
            const progressFill = document.getElementById('progressFill');

            let isGenerating = false;
            let currentCachedIps = [];

            function showMessage(text, type = 'error') {
                msgBox.textContent = text;
                msgBox.className = 'msg-box ' + type;
            }
            function hideMessage() {
                msgBox.className = 'msg-box';
                msgBox.textContent = '';
            }
            function updateStats(ipCount, nodeCount) {
                ipCountSpan.textContent = ipCount;
                nodeCountSpan.textContent = nodeCount;
            }
            function setProgress(percent) {
                progressFill.style.width = Math.min(100, percent) + '%';
            }
            function showProgress(show) {
                progressBar.style.display = show ? 'block' : 'none';
            }

            function uniqueIPs(lines) {
                const seen = new Set();
                const result = [];
                for (let i = 0; i < lines.length; i++) {
                    const trimmed = lines[i].trim();
                    if (trimmed && !seen.has(trimmed)) {
                        seen.add(trimmed);
                        result.push(trimmed);
                    }
                }
                return result;
            }

            function base64Decode(str) {
                let base64 = str.replace(/-/g, '+').replace(/_/g, '/');
                while (base64.length % 4 !== 0) base64 += '=';
                try {
                    const binary = atob(base64);
                    const bytes = new Uint8Array(binary.length);
                    for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
                    return new TextDecoder('utf-8').decode(bytes);
                } catch (e) {
                    return null;
                }
            }

            function base64Encode(str) {
                try {
                    const bytes = new TextEncoder().encode(str);
                    let binary = '';
                    for (let i = 0; i < bytes.byteLength; i++) {
                        binary += String.fromCharCode(bytes[i]);
                    }
                    return btoa(binary);
                } catch (e) {
                    return null;
                }
            }

            function processVmess(link, newIP) {
                try {
                    const base64Part = link.substring(8);
                    const decoded = base64Decode(base64Part);
                    if (!decoded) return null;
                    let obj = JSON.parse(decoded);

                    const pureIP = newIP.replace(/[\[\]]/g, '');
                    let replaced = false;
                    if (obj.add) { obj.add = pureIP; replaced = true; }
                    if (obj.address) { obj.address = pureIP; replaced = true; }
                    if (!replaced) return null;

                    const encodedPart = base64Encode(JSON.stringify(obj));
                    return encodedPart ? 'vmess://' + encodedPart : null;
                } catch (e) {
                    return null;
                }
            }

            function processVless(link, newIP) {
                try {
                    const prefixIndex = link.indexOf('://');
                    if (prefixIndex === -1) return null;

                    const protocol = link.substring(0, prefixIndex + 3);
                    const mainPart = link.substring(prefixIndex + 3);

                    const atIndex = mainPart.indexOf('@');
                    if (atIndex === -1) return null;

                    const credentials = mainPart.substring(0, atIndex + 1);
                    const remainder = mainPart.substring(atIndex + 1);

                    let breakIndex = remainder.search(/[:?#]/);
                    let hostPart = remainder;
                    let suffixPart = '';

                    if (breakIndex !== -1) {
                        hostPart = remainder.substring(0, breakIndex);
                        suffixPart = remainder.substring(breakIndex);
                    }

                    let safeIP = newIP;
                    if (newIP.includes(':') && !newIP.startsWith('[')) {
                        safeIP = `[${newIP}]`;
                    }

                    try {
                        if (suffixPart.includes('#')) {
                            suffixPart = decodeURIComponent(suffixPart);
                        }
                    } catch (e) { }

                    return protocol + credentials + safeIP + suffixPart;
                } catch (e) {
                    return null;
                }
            }

            function generateNodesAsync(originalLink, ipList, batchSize = 400) {
                return new Promise((resolve, reject) => {
                    let type = '';
                    if (originalLink.startsWith('vmess://')) type = 'vmess';
                    else if (originalLink.startsWith('vless://')) type = 'vless';
                    else {
                        reject(new Error('不支持的协议，仅支持 vmess:// 和 vless://'));
                        return;
                    }

                    const total = ipList.length;
                    let processed = 0;
                    const results = [];

                    function processBatch() {
                        if (!isGenerating) {
                            reject(new Error('已取消生成'));
                            return;
                        }

                        const end = Math.min(processed + batchSize, total);
                        for (let i = processed; i < end; i++) {
                            const ip = ipList[i];
                            let newLink = null;
                            if (type === 'vmess') newLink = processVmess(originalLink, ip);
                            else if (type === 'vless') newLink = processVless(originalLink, ip);
                            if (newLink) results.push(newLink);
                        }
                        processed = end;
                        setProgress((processed / total) * 100);

                        if (processed < total) {
                            requestAnimationFrame(processBatch);
                        } else {
                            resolve(results);
                        }
                    }

                    requestAnimationFrame(processBatch);
                });
            }

            async function handleGenerate() {
                if (isGenerating) return;

                resultArea.value = '';
                hideMessage();

                const original = originalNodeInput.value.trim();
                if (!original) {
                    showMessage('请输入原始节点链接', 'error');
                    return;
                }

                if (currentCachedIps.length === 0) {
                    showMessage('请至少输入一个有效的IP地址', 'error');
                    return;
                }

                if (currentCachedIps.length > 10000) {
                    showMessage(`⚠️ 提示：当前IP数量（${currentCachedIps.length}个），耗时较长，请耐心等待。`, 'warning');
                }

                isGenerating = true;
                generateBtn.disabled = true;
                clearBtn.disabled = true;
                clearResultBtn.disabled = true;
                generateBtn.textContent = '⏳ 生成中...';
                showProgress(true);
                setProgress(0);

                try {
                    const newNodes = await generateNodesAsync(original, currentCachedIps);
                    if (newNodes.length === 0) {
                        showMessage('生成失败，请检查原始节点格式是否正确', 'error');
                    } else {
                        resultArea.style.display = 'none';
                        resultArea.value = newNodes.join('\n');
                        resultArea.style.display = 'block';

                        updateStats(currentCachedIps.length, newNodes.length);
                        if (currentCachedIps.length <= 10000) hideMessage();
                    }
                } catch (err) {
                    if (err.message !== '已取消生成') {
                        showMessage(err.message, 'error');
                    }
                } finaly: {
                    isGenerating = false;
                    generateBtn.disabled = false;
                    clearBtn.disabled = false;
                    clearResultBtn.disabled = false;
                    generateBtn.textContent = '⚡ 生成节点';
                    showProgress(false);
                    setProgress(0);
                }
            }

            function handleClear() {
                isGenerating = false;
                ipListTextarea.value = '';
                resultArea.value = '';
                currentCachedIps = [];
                updateStats(0, 0);
                hideMessage();
                showProgress(false);
            }

            function handleCopy() {
                const text = resultArea.value;
                if (!text) {
                    showMessage('没有可复制的内容', 'error');
                    return;
                }
                navigator.clipboard.writeText(text).then(() => {
                    const orig = copyBtn.textContent;
                    copyBtn.textContent = '✅ 已复制!';
                    setTimeout(() => copyBtn.textContent = orig, 2000);
                }).catch(() => {
                    resultArea.select();
                    document.execCommand('copy');
                    alert('已复制到剪贴板');
                });
            }

            function handleClearResult() {
                if (!isGenerating) {
                    resultArea.value = '';
                    nodeCountSpan.textContent = '0';
                }
            }

            let debounceTimer = null;
            ipListTextarea.addEventListener('input', function () {
                clearTimeout(debounceTimer);
                debounceTimer = setTimeout(() => {
                    const lines = this.value.split('\n');
                    currentCachedIps = uniqueIPs(lines);

                    ipCountSpan.textContent = currentCachedIps.length;
                    if (currentCachedIps.length > 10000) {
                        showMessage(`⚠️ 注意：当前IP数量 ${currentCachedIps.length}，超过10000个，生成时可能较慢。`, 'warning');
                    } else {
                        if (msgBox.classList.contains('warning')) hideMessage();
                    }
                }, 300);
            });

            const lines = ipListTextarea.value.split('\n');
            currentCachedIps = uniqueIPs(lines);
            ipCountSpan.textContent = currentCachedIps.length;

            generateBtn.addEventListener('click', handleGenerate);
            clearBtn.addEventListener('click', handleClear);
            copyBtn.addEventListener('click', handleCopy);
            clearResultBtn.addEventListener('click', handleClearResult);

            document.addEventListener('keydown', function (e) {
                if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
                    const active = document.activeElement;
                    if (active === originalNodeInput || active === ipListTextarea || active === resultArea) {
                        e.preventDefault();
                        generateBtn.click();
                    }
                }
            });
        })();
    </script>
</body>

</html>
